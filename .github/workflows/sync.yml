name: Garmin to Notion Sync
on:
  schedule:
    - cron: "2 20 * * *"
  workflow_dispatch:
concurrency:
  group: garmin-to-notion
  cancel-in-progress: true
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Restore Garmin tokens from secret
        run: |
          mkdir -p ~/.garmin_tokens
          if [ -n "$GARMIN_TOKENS" ]; then
            echo "$GARMIN_TOKENS" | base64 -d > /tmp/garmin_bundle.json
            python3 scripts/restore_tokens.py
          else
            echo "No GARMIN_TOKENS secret found, will attempt fresh login."
          fi
        env:
          GARMIN_TOKENS: ${{ secrets.GARMIN_TOKENS }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run sync
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          GARMIN_TOKENSTORE: ~/.garmin_tokens
          TIMEZONE: ${{ vars.TIMEZONE }}
          GARMIN_DAYS_BACK: ${{ vars.GARMIN_DAYS_BACK }}
          GARMIN_ACTIVITIES_FETCH_LIMIT: ${{ vars.GARMIN_ACTIVITIES_FETCH_LIMIT }}
          PYTHONPATH: src
        run: python -m garmin_to_notion all

      - name: Save updated Garmin tokens back to secret
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -f ~/.garmin_tokens/oauth1_token.json ] && [ -f ~/.garmin_tokens/oauth2_token.json ]; then
            python3 scripts/save_tokens.py | gh secret set GARMIN_TOKENS
            echo "Tokens saved successfully."
          else
            echo "No token files found to save."
          fi
