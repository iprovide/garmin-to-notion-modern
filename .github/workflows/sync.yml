name: Garmin to Notion Sync

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

concurrency:
  group: garmin-to-notion
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: $ runner.os -pip-$ hashFiles('**/requirements.txt')​NOTION_TWS[ ]NOTION_TWS​
          restore-keys: |
            $ runner.os -pip-

      - name: Restore Garmin tokens
        uses: actions/cache@v4
        with:
          path: ~/.garmin_tokens
          # stable key so tokens persist across runs
          key: garmin-tokens-v1-$ runner.os​NOTION_TWS[ ]NOTION_TWS​

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run sync
        env:
          GARMIN_EMAIL: $ secrets.GARMIN_EMAIL​NOTION_TWS[ ]NOTION_TWS​
          GARMIN_PASSWORD: $ secrets.GARMIN_PASSWORD​NOTION_TWS[ ]NOTION_TWS​
          GARMIN_TOKENS: $ secrets.GARMIN_TOKENS​NOTION_TWS[ ]NOTION_TWS​
          NOTION_TOKEN: $ secrets.NOTION_TOKEN​NOTION_TWS[ ]NOTION_TWS​

          GARMIN_TOKENSTORE: ~/.garmin_tokens

          # Option B: no default; requires you to define TIMEZONE as an Actions variable
          TIMEZONE: $ vars.TIMEZONE​NOTION_TWS[ ]NOTION_TWS​

          GARMIN_DAYS_BACK: $ vars.GARMIN_DAYS_BACK​NOTION_TWS[ ]NOTION_TWS​
          GARMIN_ACTIVITIES_FETCH_LIMIT: $ vars.GARMIN_ACTIVITIES_FETCH_LIMIT​NOTION_TWS[ ]NOTION_TWS​

          PYTHONPATH: src
        run: python -m garmin_to_notion all
